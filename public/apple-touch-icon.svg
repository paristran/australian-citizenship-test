<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Blue background -->
  <rect width="180" height="180" fill="#00008B"/>
  
  <!-- Union Jack area -->
  <path d="M0 0 L90 90" stroke="#FFFFFF" stroke-width="15"/>
  <path d="M90 0 L0 90" stroke="#FFFFFF" stroke-width="15"/>
  <path d="M0 0 L90 90" stroke="#CF142B" stroke-width="7"/>
  <path d="M90 0 L0 90" stroke="#CF142B" stroke-width="7"/>
  <path d="M45 0 L45 90 M0 45 L90 45" stroke="#FFFFFF" stroke-width="15"/>
  <path d="M45 0 L45 90 M0 45 L90 45" stroke="#CF142B" stroke-width="7"/>
  
  <!-- Commonwealth Star -->
  <g transform="translate(45, 125)">
    <polygon points="0,-20 5,-6 20,-5 9,3 12,20 0,12 -12,20 -9,3 -20,-5 -5,-6" fill="#FFFFFF"/>
  </g>
  
  <!-- Southern Cross stars -->
  <polygon points="145,145 148,136 158,136 151,142 153,154 145,147 137,154 139,142 132,136 142,136" fill="#FFFFFF"/>
  <polygon points="158,100 161,92 169,92 164,97 165,108 158,102 151,108 152,97 146,92 155,92" fill="#FFFFFF"/>
  <polygon points="135,63 137,55 146,55 141,60 143,72 135,66 127,72 129,60 123,55 133,55" fill="#FFFFFF"/>
  <polygon points="117,90 119,83 127,83 123,87 124,98 117,93 110,98 111,87 105,83 114,83" fill="#FFFFFF"/>
  <polygon points="140,108 142,103 148,103 145,106 146,113 140,109 134,113 135,106 131,103 138,103" fill="#FFFFFF"/>
</svg>
