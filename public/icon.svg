<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue background - Australian Flag Blue -->
  <rect width="100" height="100" fill="#00008B"/>
  
  <!-- Union Jack area (top-left quarter) -->
  <!-- White diagonal lines -->
  <path d="M0 0 L50 50" stroke="#FFFFFF" stroke-width="8"/>
  <path d="M50 0 L0 50" stroke="#FFFFFF" stroke-width="8"/>
  <!-- Red diagonal lines -->
  <path d="M0 0 L50 50" stroke="#CF142B" stroke-width="4"/>
  <path d="M50 0 L0 50" stroke="#CF142B" stroke-width="4"/>
  <!-- White cross -->
  <path d="M25 0 L25 50 M0 25 L50 25" stroke="#FFFFFF" stroke-width="8"/>
  <!-- Red cross -->
  <path d="M25 0 L25 50 M0 25 L50 25" stroke="#CF142B" stroke-width="4"/>
  
  <!-- Commonwealth Star (7-pointed) - center left -->
  <g transform="translate(25, 70)">
    <polygon points="0,-12 3,-4 12,-3 5,2 7,12 0,6 -7,12 -5,2 -12,-3 -3,-4" fill="#FFFFFF"/>
    <!-- 7th point -->
    <polygon points="0,6 -2,14 2,14" fill="#FFFFFF"/>
  </g>
  
  <!-- Southern Cross - 5 white stars -->
  <!-- Alpha Crucis -->
  <polygon points="80,80 82,74 88,74 84,78 85,84 80,80 75,84 76,78 72,74 78,74" fill="#FFFFFF"/>
  <!-- Beta Crucis -->
  <polygon points="88,55 89,50 94,50 91,53 92,59 88,56 84,59 85,53 82,50 87,50" fill="#FFFFFF"/>
  <!-- Gamma Crucis -->
  <polygon points="75,35 76,30 82,30 78,33 80,40 75,36 70,40 72,33 68,30 74,30" fill="#FFFFFF"/>
  <!-- Delta Crucis -->
  <polygon points="65,50 66,46 71,46 68,48 69,54 65,51 61,54 62,48 58,46 64,46" fill="#FFFFFF"/>
  <!-- Epsilon Crucis (smaller) -->
  <polygon points="78,60 79,57 82,57 80,59 81,63 78,61 75,63 76,59 74,57 77,57" fill="#FFFFFF"/>
</svg>
