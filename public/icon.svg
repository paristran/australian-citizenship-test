<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Australian Flag Icon -->
  <rect width="100" height="100" fill="#00008B"/>
  
  <!-- Union Jack simplified -->
  <path d="M0 0 L100 100 M100 0 L0 100" stroke="#fff" stroke-width="20"/>
  <path d="M0 0 L100 100 M100 0 L0 100" stroke="#ff0000" stroke-width="10"/>
  
  <!-- Commonwealth Star -->
  <polygon points="50,25 53,40 68,40 56,50 60,65 50,55 40,65 44,50 32,40 47,40" fill="#fff"/>
  
  <!-- Southern Cross stars -->
  <circle cx="80" cy="20" r="3" fill="#fff"/>
  <circle cx="85" cy="35" r="2.5" fill="#fff"/>
  <circle cx="75" cy="45" r="2" fill="#fff"/>
  <circle cx="90" cy="50" r="2.5" fill="#fff"/>
  <circle cx="80" cy="60" r="2" fill="#fff"/>
</svg>
